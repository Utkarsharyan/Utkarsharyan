<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="100%" height="100%">
  <!-- Definition of gradients and paths -->
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030712" />
      <stop offset="50%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>

    <!-- Text Gradient (Cyan to Purple/Pink) -->
    <linearGradient id="text-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="50%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#c084fc" />
    </linearGradient>

    <!-- Glow Gradients -->
    <radialGradient id="blue-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="purple-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c084fc" stop-opacity="0.18" />
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0" />
    </radialGradient>

    <!-- Typing Clip Path -->
    <clipPath id="typing-clip">
      <rect id="clip-rect" x="0" y="-50" width="0" height="70">
        <animate attributeName="width"
                 values="0;0;28;56;85;113;142;170;199;227;256;284;313;341;370;370;341;313;284;256;227;199;170;142;113;85;56;28;0;0"
                 keyTimes="0.0;0.1;0.1231;0.1462;0.1692;0.1923;0.2154;0.2385;0.2615;0.2846;0.3077;0.3308;0.3538;0.3769;0.4;0.6;0.6231;0.6462;0.6692;0.6923;0.7154;0.7385;0.7615;0.7846;0.8077;0.8308;0.8538;0.8769;0.9;1.0"
                 dur="8s"
                 calcMode="discrete"
                 repeatCount="indefinite" />
      </rect>
    </clipPath>
  </defs>

  <style>
    /* Typography */
    .name-text {
      font-family: 'Consolas', 'Courier New', Courier, monospace;
      font-weight: 700;
      font-size: 46px;
      fill: url(#text-gradient);
      letter-spacing: 0.5px;
    }
    
    .subtitle-text {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-weight: 500;
      font-size: 18px;
      fill: #94a3b8;
      letter-spacing: 1.5px;
    }

    .cursor {
      fill: #c084fc;
    }

    /* Keyframe Animations */
    @keyframes cursor-blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }

    @keyframes subtitle-fade {
      0%, 42% { opacity: 0; }
      50%, 62% { opacity: 1; }
      70%, 100% { opacity: 0; }
    }

    .cursor-blink-el {
      animation: cursor-blink 0.8s infinite;
    }

    .subtitle-text {
      opacity: 0;
    }
  </style>

  <!-- Background Rect -->
  <rect width="100%" height="100%" fill="url(#bg-gradient)" rx="16" />

  <!-- Subtle Outer Border -->
  <rect width="99.5%" height="98.5%" x="0.25%" y="0.75%" fill="none" stroke="#ffffff" stroke-opacity="0.06" rx="16" stroke-width="1.5" />

  <!-- Glow effects -->
  <ellipse cx="150" cy="100" rx="250" ry="180" fill="url(#blue-glow)" />
  <ellipse cx="650" cy="200" rx="280" ry="220" fill="url(#purple-glow)" />

  <!-- Code/Tech grid pattern (subtle lines) -->
  <path d="M 0,50 L 800,50 M 0,100 L 800,100 M 0,150 L 800,150 M 0,200 L 800,200 M 0,250 L 800,250" stroke="#ffffff" stroke-width="1" opacity="0.015" />
  <path d="M 100,0 L 100,300 M 200,0 L 200,300 M 300,0 L 300,300 M 400,0 L 400,300 M 500,0 L 500,300 M 600,0 L 600,300 M 700,0 L 700,300" stroke="#ffffff" stroke-width="1" opacity="0.015" />

  <!-- Centered typing area (group width: ~370px) -->
  <g transform="translate(215, 130)">
    <!-- Typed Name -->
    <text x="0" y="0" class="name-text" clip-path="url(#typing-clip)">Utkarsh Aryan</text>
    
    <!-- Blinking Cursor -->
    <g>
      <rect x="0" y="-42" width="3" height="48" class="cursor cursor-blink-el">
        <animateTransform attributeName="transform"
                          type="translate"
                          values="0,0;0,0;28,0;56,0;85,0;113,0;142,0;170,0;199,0;227,0;256,0;284,0;313,0;341,0;370,0;370,0;341,0;313,0;284,0;256,0;227,0;199,0;170,0;142,0;113,0;85,0;56,0;28,0;0,0;0,0"
                          keyTimes="0.0;0.1;0.1231;0.1462;0.1692;0.1923;0.2154;0.2385;0.2615;0.2846;0.3077;0.3308;0.3538;0.3769;0.4;0.6;0.6231;0.6462;0.6692;0.6923;0.7154;0.7385;0.7615;0.7846;0.8077;0.8308;0.8538;0.8769;0.9;1.0"
                          dur="8s"
                          calcMode="discrete"
                          repeatCount="indefinite" />
      </rect>
    </g>
  </g>

  <!-- Subtitle -->
  <text x="400" y="195" class="subtitle-text" text-anchor="middle">
    Full Stack Developer | Spring Boot Architect | DSA Enthusiast
    <animate attributeName="opacity"
             values="0;0;1;1;0;0"
             keyTimes="0.0;0.42;0.5;0.62;0.7;1.0"
             dur="8s"
             repeatCount="indefinite" />
  </text>
</svg>
